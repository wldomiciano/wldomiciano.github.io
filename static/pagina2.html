<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Uma página legal</title>

    <style>
      * {
        margin: 0;
      }

      p {
        font-size: 1rem;
      }

      h1 {
        font-size: 40px;
      }
    </style>
  </head>

  <body>
    <h1>Título</h1>
    <p>Parágrafo</p>

    <!-- Aqui o parágrafo ficou maior que o título, isto porque o título foi definido
    absolutamente usando PX (ele sempre terá 40px independente do tamanho da
    fonte escolhido pelo usuário nas configurações do navegador). Já o parágrafo
    tem a medida relativa ao tamanho da fonte definida no navegador, que no caso
    pode ser bem maior que 40px. -->
  </body>
</html>
